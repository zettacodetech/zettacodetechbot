<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f6f8">
  <title>ZettaCode Tech</title>
  <link rel="stylesheet" href="/app/styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <strong>ZettaCode Tech</strong>
      <span>AI savdo agenti</span>
    </div>
    <button id="closeButton" class="icon-button" type="button" aria-label="Yopish" title="Yopish">&times;</button>
  </header>

  <nav class="tabs" aria-label="Asosiy bo'limlar">
    <button class="tab active" data-tab="order" type="button">Buyurtma</button>
    <button class="tab" data-tab="status" type="button">Status</button>
    <button class="tab" data-tab="portfolio" type="button">Portfolio</button>
    <button class="tab" data-tab="support" type="button">Support</button>
  </nav>

  <main>
    <section id="orderView" class="view active">
      <h1>Yangi loyiha</h1>
      <p class="muted">Yo'nalishni tanlang va loyiha vazifalarini batafsil yozing.</p>

      <form id="orderForm">
        <label for="project">Loyiha turi</label>
        <select id="project" required>
          <option value="">Tanlang</option>
          <option value="telegram_bot_simple">Oddiy Telegram bot</option>
          <option value="telegram_twa">Telegram Web App</option>
          <option value="telegram_order_bot">Kurer / buyurtma bot</option>
          <option value="website_landing">Landing Page</option>
          <option value="website_corporate">Korporativ sayt</option>
          <option value="website_store">Online do'kon</option>
          <option value="mobile_app">Mobil ilova</option>
          <option value="crm_system">CRM tizimi</option>
          <option value="accounting_system">Hisob-kitob tizimi</option>
        </select>

        <label for="requirements">Loyiha talablari</label>
        <textarea
          id="requirements"
          minlength="40"
          maxlength="4000"
          required
          placeholder="Foydalanuvchi va admin nimalar qilishi, katalog, buyurtma, hisobot, integratsiya va boshqa funksiyalarni yozing."
        ></textarea>
        <div class="field-row">
          <span class="muted">Loyiha ichidagi to'lov faqat naqd.</span>
          <span id="characterCount" class="muted">0 / 4000</span>
        </div>

        <button class="primary-button" type="submit">Talablarni yuborish</button>
      </form>
    </section>

    <section id="statusView" class="view">
      <div class="section-header">
        <h1>Buyurtma holati</h1>
        <button id="refreshStatus" class="secondary-button" type="button">Yangilash</button>
      </div>
      <div id="statusContent" class="panel muted">Buyurtma ma'lumoti yuklanmagan.</div>
    </section>

    <section id="portfolioView" class="view">
      <h1>Portfolio</h1>
      <div id="portfolioList" class="list"></div>
    </section>

    <section id="supportView" class="view">
      <h1>Support</h1>
      <form id="supportForm">
        <label for="supportMessage">Murojaat</label>
        <textarea id="supportMessage" minlength="10" maxlength="2000" required></textarea>
        <button class="primary-button" type="submit">Ticket ochish</button>
      </form>
    </section>

    <div id="notice" class="notice" role="status" aria-live="polite"></div>
  </main>

  <script src="/app/app.js"></script>
</body>
</html>
